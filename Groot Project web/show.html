<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveLedger - Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="home.html" class="logo">LiveLedger</a>
    <nav class="navlinks">
      <a href="shows.php">Recente shows</a>
      <a href="artist.html">Artiesten</a>
      <a href="venues.html">Venues</a>
      <a href="community.html">Community</a>
      <a href="profile.php">Profiel</a>
    </nav>
    <div class="actions">
      <a href="login.php" class="btn btn-ghost">Inloggen</a>
      <a href="register.php" class="btn btn-accent">Registreren</a>
    </div>
  </header>

  <main class="container section">
    <p class="kicker">Show</p>
    <h1 id="show-title">The National - 2026-05-08</h1>
    <p class="hero-copy" id="show-meta">Vorst Nationaal, Brussel &bull; Gemiddelde score: 4.8/5</p>

    <section class="section">
      <div class="section-head"><h2>Setlist</h2></div>
      <article class="card">
        <ol id="setlist">
          <li>Tropic Morning News</li>
          <li>Bloodbuzz Ohio</li>
          <li>Fake Empire</li>
        </ol>
      </article>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Reacties</h2>
        <p class="comment-count" id="comment-count">0 reacties</p>
      </div>

      <form class="comment-form card" id="comment-form">
        <a class="avatar-link" href="profile.php" aria-label="Ga naar profiel van @luka_live">
          <span class="avatar">LL</span>
        </a>
        <div class="comment-inputs">
          <label class="sr-only" for="comment-text">Plaats een reactie</label>
          <textarea id="comment-text" name="comment" rows="3" placeholder="Plaats een reactie..." required></textarea>
          <div class="comment-tools">
            <label class="rating-field" for="comment-rating">
              Rating
              <select id="comment-rating" name="rating" required>
                <option value="5">5/5</option>
                <option value="4">4/5</option>
                <option value="3">3/5</option>
                <option value="2">2/5</option>
                <option value="1">1/5</option>
              </select>
            </label>
            <button class="btn btn-accent" type="submit">Reageren</button>
          </div>
        </div>
      </form>

      <div class="comments-list" id="comments-list" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const shows = {
      "fontaines-dc-2026-05-12": {
        artist: "Fontaines D.C.",
        date: "2026-05-12",
        venue: "Ancienne Belgique, Brussel",
        score: "4.6/5",
        setlist: ["Starburster", "Boys in the Better Land", "Favourite"],
        comments: [
          {
            username: "mila_stage",
            initials: "MS",
            rating: 5,
            text: "Starburster klonk live echt gigantisch. Heel sterke opener.",
            date: "3 dagen geleden"
          },
          {
            username: "bram_gigs",
            initials: "BG",
            rating: 4,
            text: "Veel energie in de zaal, maar de vocals stonden soms wat stil in de mix.",
            date: "2 dagen geleden"
          }
        ]
      },
      "idles-2026-05-10": {
        artist: "IDLES",
        date: "2026-05-10",
        venue: "De Roma, Antwerpen",
        score: "4.7/5",
        setlist: ["Dancer", "Danny Nedelko", "Never Fight a Man With a Perm"],
        comments: [
          {
            username: "noahrecords",
            initials: "NR",
            rating: 5,
            text: "De Roma stond volledig op scherp. Dancer was het hoogtepunt.",
            date: "4 dagen geleden"
          },
          {
            username: "jade_live",
            initials: "JL",
            rating: 4,
            text: "Brute show met veel interactie. Setlist mocht voor mij nog iets langer.",
            date: "3 dagen geleden"
          }
        ]
      },
      "the-national-2026-05-08": {
        artist: "The National",
        date: "2026-05-08",
        venue: "Vorst Nationaal, Brussel",
        score: "4.8/5",
        setlist: ["Tropic Morning News", "Bloodbuzz Ohio", "Fake Empire"],
        comments: [
          {
            username: "mila_stage",
            initials: "MS",
            rating: 5,
            text: "Sterk concert, top setlist. Bloodbuzz Ohio live blijft kippenvel.",
            date: "2 dagen geleden"
          },
          {
            username: "noahrecords",
            initials: "NR",
            rating: 4,
            text: "Geluid was heel goed in de zaal. Alleen jammer dat About Today niet in de set zat.",
            date: "1 dag geleden"
          }
        ]
      },
      "khruangbin-2026-05-01": {
        artist: "Khruangbin",
        date: "2026-05-01",
        venue: "AB, Brussel",
        score: "4.5/5",
        setlist: ["Time (You and I)", "Evan Finds the Third Room", "People Everywhere"],
        comments: [
          {
            username: "vinylmax",
            initials: "VM",
            rating: 5,
            text: "Heel strakke groove van begin tot einde. De zaal zat meteen mee.",
            date: "5 dagen geleden"
          }
        ]
      },
      "khruangbin-2026-04-14": {
        artist: "Khruangbin",
        date: "2026-04-14",
        venue: "Trix, Antwerpen",
        score: "4.2/5",
        setlist: ["Friday Morning", "Lady and Man", "Maria Tambien"],
        comments: [
          {
            username: "sofie_setlists",
            initials: "SS",
            rating: 4,
            text: "Mooie sfeer en sterke visuals. De bisronde was kort maar goed.",
            date: "1 week geleden"
          }
        ]
      }
    };
    const currentUser = {
      username: "luka_live",
      initials: "LL"
    };
    const params = new URLSearchParams(window.location.search);
    const showId = shows[params.get("id")] ? params.get("id") : "the-national-2026-05-08";
    const activeShow = shows[showId];
    const commentsKey = `liveledger-comments-${showId}`;

    const showTitle = document.querySelector("#show-title");
    const showMeta = document.querySelector("#show-meta");
    const setlist = document.querySelector("#setlist");
    const commentsList = document.querySelector("#comments-list");
    const commentCount = document.querySelector("#comment-count");
    const commentForm = document.querySelector("#comment-form");
    const commentText = document.querySelector("#comment-text");
    const commentRating = document.querySelector("#comment-rating");
    const currentUserAvatar = document.querySelector(".comment-form .avatar");

    function getComments() {
      const savedComments = localStorage.getItem(commentsKey);
      return savedComments ? JSON.parse(savedComments) : activeShow.comments;
    }

    function saveComments(comments) {
      localStorage.setItem(commentsKey, JSON.stringify(comments));
    }

    function getProfilePhoto(username) {
      return localStorage.getItem(`liveledger-profile-photo-${username}`);
    }

    function applyAvatar(element, comment) {
      const photoUrl = getProfilePhoto(comment.username);

      if (photoUrl) {
        element.textContent = "";
        element.style.backgroundImage = `url("${photoUrl}")`;
        element.classList.add("has-image");
      } else {
        element.style.backgroundImage = "";
        element.classList.remove("has-image");
        element.textContent = comment.initials;
      }
    }

    function createComment(comment) {
      const article = document.createElement("article");
      article.className = "comment card";

      const profileHref = "profile.php";
      const avatarLink = document.createElement("a");
      avatarLink.className = "avatar-link";
      avatarLink.href = profileHref;
      avatarLink.setAttribute("aria-label", `Ga naar profiel van @${comment.username}`);

      const avatar = document.createElement("span");
      avatar.className = "avatar";
      applyAvatar(avatar, comment);
      avatarLink.append(avatar);

      const body = document.createElement("div");
      body.className = "comment-body";

      const meta = document.createElement("div");
      meta.className = "comment-meta";

      const author = document.createElement("a");
      author.className = "comment-author";
      author.href = profileHref;
      author.textContent = `@${comment.username}`;

      const date = document.createElement("span");
      date.textContent = comment.date;

      const rating = document.createElement("span");
      rating.className = "comment-rating";
      rating.textContent = `${"\u2605".repeat(comment.rating)}${"\u2606".repeat(5 - comment.rating)} ${comment.rating}/5`;

      const text = document.createElement("p");
      text.textContent = comment.text;

      meta.append(author, date, rating);
      body.append(meta, text);
      article.append(avatarLink, body);

      return article;
    }

    function renderComments() {
      const comments = getComments();
      commentsList.replaceChildren(...comments.map(createComment));
      commentCount.textContent = `${comments.length} reactie${comments.length === 1 ? "" : "s"}`;
      applyAvatar(currentUserAvatar, currentUser);
    }

    function renderShow() {
      showTitle.textContent = `${activeShow.artist} - ${activeShow.date}`;
      showMeta.innerHTML = `${activeShow.venue} &bull; Gemiddelde score: ${activeShow.score}`;
      document.title = `LiveLedger - ${activeShow.artist}`;
      setlist.replaceChildren(...activeShow.setlist.map((song) => {
        const item = document.createElement("li");
        item.textContent = song;
        return item;
      }));
    }

    commentForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = commentText.value.trim();

      if (!text) {
        return;
      }

      const comments = getComments();
      comments.unshift({
        username: currentUser.username,
        initials: currentUser.initials,
        rating: Number(commentRating.value),
        text,
        date: "Net geplaatst"
      });

      saveComments(comments);
      commentForm.reset();
      commentRating.value = "5";
      renderComments();
    });

    renderShow();
    renderComments();
  </script>
</body>
</html>
