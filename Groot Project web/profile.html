<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=profile.php" />
  <title>Redirect</title>
</head>
<body>
  <p>Ga naar <a href="profile.php">profile.php</a>...</p>
  <header class="topbar">
    <a href="home.html" class="logo">LiveLedger</a>
    <nav class="navlinks">
      <a href="shows.html">Recente shows</a>
      <a href="artist.html">Artiesten</a>
      <a href="venues.html">Venues</a>
      <a href="community.html">Community</a>
    </nav>
    <div class="actions">
      <a href="profile.html" class="btn btn-ghost">Profiel</a>
      <a href="add-show.html" class="btn btn-accent">Show toevoegen</a>
    </div>
  </header>

  <main class="container section">
    <p class="kicker">Gebruiker</p>
    <section class="profile-header card">
      <div class="profile-photo-wrap">
        <span class="avatar profile-photo" id="profile-photo">LL</span>
      </div>
      <div class="profile-intro">
        <h1 id="profile-name">@luka_live</h1>
        <form class="profile-upload" id="profile-upload">
          <label class="btn btn-ghost" for="profile-photo-input">Kies profielfoto</label>
          <input class="sr-only" id="profile-photo-input" type="file" accept="image/*" />
          <button class="btn btn-ghost" id="remove-profile-photo" type="button">Verwijderen</button>
          <p class="profile-upload-status" id="profile-upload-status"></p>
        </form>
      </div>
    </section>
    <section class="section">
      <div class="section-head"><h2>Bijgewoonde shows</h2></div>
      <article class="card"><p>12 shows gelogd</p></article>
    </section>
    <section class="section">
      <div class="section-head"><h2>Reviews</h2></div>
      <article class="card"><p>5 reviews geschreven</p></article>
    </section>
  </main>
  <script>
    const currentUser = "luka_live";
    const profileName = document.querySelector("#profile-name");
    const profilePhoto = document.querySelector("#profile-photo");
    const profileUpload = document.querySelector("#profile-upload");
    const photoInput = document.querySelector("#profile-photo-input");
    const removePhotoButton = document.querySelector("#remove-profile-photo");
    const uploadStatus = document.querySelector("#profile-upload-status");
    const params = new URLSearchParams(window.location.search);
    const username = params.get("user") || currentUser;
    const isOwnProfile = username === currentUser;
    const viewedPhotoKey = `liveledger-profile-photo-${username}`;
    const currentUserPhotoKey = `liveledger-profile-photo-${currentUser}`;

    function initialsFor(name) {
      return name
        .split(/[_\s-]+/)
        .map((part) => part.charAt(0))
        .join("")
        .slice(0, 2)
        .toUpperCase();
    }

    function showPhoto(photoUrl) {
      profilePhoto.textContent = "";
      profilePhoto.style.backgroundImage = `url("${photoUrl}")`;
      profilePhoto.classList.add("has-image");
    }

    function showInitials() {
      profilePhoto.style.backgroundImage = "";
      profilePhoto.classList.remove("has-image");
      profilePhoto.textContent = initialsFor(username);
    }

    function loadPhoto() {
      const savedPhoto = localStorage.getItem(viewedPhotoKey);

      if (savedPhoto) {
        showPhoto(savedPhoto);
      } else {
        showInitials();
      }
    }

    function saveResizedPhoto(file) {
      const reader = new FileReader();

      reader.addEventListener("load", () => {
        const image = new Image();

        image.addEventListener("load", () => {
          const canvas = document.createElement("canvas");
          const size = 512;
          const scale = Math.max(size / image.width, size / image.height);
          const width = image.width * scale;
          const height = image.height * scale;
          const offsetX = (size - width) / 2;
          const offsetY = (size - height) / 2;

          canvas.width = size;
          canvas.height = size;

          const context = canvas.getContext("2d");
          context.drawImage(image, offsetX, offsetY, width, height);

          const photoUrl = canvas.toDataURL("image/jpeg", 0.82);
          localStorage.setItem(currentUserPhotoKey, photoUrl);
          showPhoto(photoUrl);
          uploadStatus.textContent = "Profielfoto opgeslagen.";
        });

        image.src = reader.result;
      });

      reader.readAsDataURL(file);
    }

    profileName.textContent = `@${username}`;
    document.title = `LiveLedger - @${username}`;

    if (!isOwnProfile) {
      profileUpload.remove();
      photoInput.disabled = true;
      removePhotoButton.disabled = true;
    } else {
      photoInput.addEventListener("change", () => {
        const file = photoInput.files[0];

        if (!file) {
          return;
        }

        if (!file.type.startsWith("image/")) {
          uploadStatus.textContent = "Kies een afbeeldingsbestand.";
          return;
        }

        saveResizedPhoto(file);
      });

      removePhotoButton.addEventListener("click", () => {
        localStorage.removeItem(currentUserPhotoKey);
        showInitials();
        photoInput.value = "";
        uploadStatus.textContent = "Profielfoto verwijderd.";
      });
    }

    loadPhoto();
  </script>
</body>
</html>
